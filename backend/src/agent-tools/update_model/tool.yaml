id: update_model
source: builtin
tier: domain
category: modeling
enabledByDefault: false
displayName:
  zh: 更新结构模型
  en: Update Structural Model
description:
  zh: 基于现有会话中的结构模型与参数，对几何、荷载、材料、截面和边界条件进行增量更新。
  en: Apply incremental updates to geometry, loads, materials, sections, and boundary conditions based on the existing structural model context.
requiresSkills: []
requiresTools: []
tags:
  - update
  - model
  - structure-type
inputSchema:
  type: object
  required:
    - message
  properties:
    message:
      type: string
    conversationId:
      type: string
    phase:
      enum:
        - interactive
        - execution
outputSchema:
  type: object
  properties:
    inferredType:
      type: string
    missingFields:
      type: array
      items:
        type: string
    extractionMode:
      enum:
        - llm
        - deterministic
    model:
      type: object
errorCodes:
  - AGENT_MISSING_MODEL_INPUT
