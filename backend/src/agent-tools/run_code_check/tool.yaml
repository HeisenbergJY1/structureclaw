id: run_code_check
source: builtin
tier: domain
category: code-check
enabledByDefault: false
displayName:
  zh: 执行规范校核
  en: Run Code Check
description:
  zh: 基于分析结果执行规范条文校核。
  en: Execute design-code checks using structural analysis results.
requiresSkills: []
requiresTools:
  - run_analysis
tags:
  - code-check
  - design
inputSchema:
  type: object
  required:
    - modelId
    - code
    - elements
  properties:
    modelId:
      type: string
    code:
      type: string
    elements:
      type: array
      items:
        type: string
outputSchema:
  type: object
  properties:
    code:
      type: string
    status:
      type: string
    summary:
      type: object
    details:
      type: array
      items:
        type: object
errorCodes:
  - CODE_CHECK_FAILED
