id: convert_model
source: builtin
tier: foundation
category: modeling
enabledByDefault: false
displayName:
  zh: 转换结构模型
  en: Convert Structural Model
description:
  zh: 在支持的结构协议格式之间转换模型。
  en: Convert a structural model between supported protocol formats.
requiresSkills: []
requiresTools: []
tags:
  - convert_model
  - model
  - protocol
inputSchema:
  type: object
  required:
    - model
  properties:
    model:
      type: object
    source_format:
      type: string
    target_format:
      type: string
    target_schema_version:
      type: string
outputSchema:
  type: object
  properties:
    sourceFormat:
      type: string
    targetFormat:
      type: string
    sourceSchemaVersion:
      type: string
    targetSchemaVersion:
      type: string
    model:
      type: object
errorCodes:
  - UNSUPPORTED_SOURCE_FORMAT
  - UNSUPPORTED_TARGET_FORMAT
  - INVALID_STRUCTURE_MODEL
