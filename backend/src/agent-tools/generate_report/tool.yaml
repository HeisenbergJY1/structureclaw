id: generate_report
source: builtin
tier: domain
category: report
enabledByDefault: false
displayName:
  zh: 生成报告
  en: Generate Report
description:
  zh: 将模型、分析与规范校核结果汇总为可读报告。
  en: Assemble inputs, analysis, and run_code_check outputs into a readable report.
requiresSkills: []
requiresTools:
  - run_analysis
tags:
  - generate_report
  - artifact
inputSchema:
  type: object
  required:
    - message
    - analysis
  properties:
    message:
      type: string
    analysis:
      type: object
    codeCheck:
      type: object
    format:
      enum:
        - json
        - markdown
        - both
outputSchema:
  type: object
  properties:
    summary:
      type: string
    json:
      type: object
    markdown:
      type: string
errorCodes: []
