id: draft_model
source: builtin
tier: domain
category: modeling
enabledByDefault: false
displayName:
  zh: 草拟结构模型
  en: Draft Structural Model
description:
  zh: 从文本和补充参数生成或更新可计算结构模型草稿。
  en: Generate or update a computable structural model draft from text and provided parameters.
requiresSkills: []
requiresTools: []
tags:
  - draft
  - model
  - structure-type
inputSchema:
  type: object
  required:
    - message
  properties:
    message:
      type: string
    conversationId:
      type: string
    phase:
      enum:
        - interactive
        - execution
outputSchema:
  type: object
  properties:
    inferredType:
      type: string
    missingFields:
      type: array
      items:
        type: string
    extractionMode:
      enum:
        - llm
        - deterministic
    model:
      type: object
errorCodes:
  - AGENT_MISSING_MODEL_INPUT
