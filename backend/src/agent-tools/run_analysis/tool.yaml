id: run_analysis
source: builtin
tier: domain
category: analysis
enabledByDefault: false
displayName:
  zh: 执行结构分析
  en: Run Structural Analysis
description:
  zh: 执行结构分析（static/dynamic/seismic/nonlinear）。
  en: Execute structural analysis (static, dynamic, seismic, or nonlinear).
requiresSkills: []
requiresTools:
  - validate_model
tags:
  - analysis
  - engine
inputSchema:
  type: object
  required:
    - type
    - model
    - parameters
  properties:
    type:
      enum:
        - static
        - dynamic
        - seismic
        - nonlinear
    model:
      type: object
    parameters:
      type: object
outputSchema:
  type: object
  properties:
    schema_version:
      type: string
    analysis_type:
      type: string
    success:
      type: boolean
    error_code:
      type:
        - string
        - "null"
    message:
      type: string
    data:
      type: object
    meta:
      type: object
errorCodes:
  - INVALID_ANALYSIS_TYPE
  - ANALYSIS_EXECUTION_FAILED
